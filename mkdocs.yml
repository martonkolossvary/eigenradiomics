site_name: eigenradiomics
site_url: https://martonkolossvary.github.io/eigenradiomics/
site_description: Modular dimensionality reduction for wide feature matrices.
site_author: Márton Kolossváry
repo_url: https://github.com/martonkolossvary/eigenradiomics
repo_name: martonkolossvary/eigenradiomics
copyright: Copyright &copy; 2026 Márton Kolossváry. Licensed under Apache 2.0.

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Share Tech Mono
    code: Roboto Mono
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            separate_signature: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - Tutorials:
      - Installation: user_guide/installation.md
      - Quick Start: user_guide/quick_start.md
      - End-to-End Workflow: user_guide/end_to_end.md
  - How-to Guides:
      - Load & align data: user_guide/data_ingestion.md
      - Screen reproducibility: user_guide/reproducibility.md
      - Diagnose batch effects: user_guide/batch_effects.md
      - Harmonize batch effects (ComBat): user_guide/harmonization.md
      - Preprocess feature tables: user_guide/radiomics_preprocessing.md
      - Reduce with WGCNA: reducers/wgcna.md
      - Visualize the clustered heatmap: user_guide/clustered_heatmap.md
      - Downstream statistical analysis: user_guide/downstream_analysis.md
      - Tune in a Pipeline / GridSearchCV: user_guide/pipelines_and_grid_search.md
      - Cookbook & recipes: user_guide/recipes.md
  - Explanation:
      - Best practices & pitfalls: user_guide/best_practices.md
      - Input data model & leakage-safe transforms: user_guide/input_data_model.md
      - The reducer contract & artifacts: reducers/index.md
      - Scalability & performance: user_guide/scalability.md
      - Troubleshooting: user_guide/troubleshooting.md
  - API Reference:
      - Package: api/package.md
      - Ingestion & Datasets: api/ingestion.md
      - Preprocessing: api/preprocessing.md
      - Reducers: api/reducers.md
      - Reproducibility: api/reproducibility.md
      - Batch Effects: api/batch_effects.md
      - Plotting: api/plotting.md
      - Clinical & Module-Trait: api/clinical.md
      - Validation Utilities (internal): api/utils.md
  - Project:
      - Quality Report: quality.md
      - Changelog: changelog.md
      - License: license.md
