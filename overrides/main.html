{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<link rel="icon" type="image/svg+xml" href="{{ 'assets/favicon.svg' | url }}">
<link rel="icon" type="image/png" href="{{ 'assets/favicon.png' | url }}">
<link rel="shortcut icon" href="{{ 'assets/favicon.ico' | url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ 'assets/apple-touch-icon.png' | url }}">
<meta property="og:image" content="{{ config.site_url }}assets/social-preview.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">

<meta name="twitter:card" content="summary_large_image">

<meta name="theme-color" content="#7b2cbf">
